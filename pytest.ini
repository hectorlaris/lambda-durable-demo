[pytest]
# Pytest configuration for Loan Workflow tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Coverage options
testpaths = tests

# Markers
markers =
    unit: Unit tests for individual activities
    integration: Integration tests for orchestrator
    scenarios: Business scenario tests
    retry: Retry behavior tests
    error: Error handling tests

AWSTemplateFormatVersion: '2010-09-09'
Description: AWS SAM Template for Loan Approval Workflow

Resources:
  LoanTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: LoanApplications
      AttributeDefinitions:
        - AttributeName: applicationId
          AttributeType: S
      KeySchema:
        - AttributeName: applicationId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  SubmitLoanApplicationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/functions/submitLoanApplication/index.submitLoanApplication
      Runtime: nodejs14.x
      Environment:
        LOAN_TABLE: !Ref LoanTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /loan
            Method: post

  EvaluateCreditScoreFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/functions/evaluateCreditScore/index.evaluateCreditScore
      Runtime: nodejs14.x
      Environment:
        LOAN_TABLE: !Ref LoanTable

  ApproveOrRejectLoanFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/functions/approveOrRejectLoan/index.approveOrRejectLoan
      Runtime: nodejs14.x
      Environment:
        LOAN_TABLE: !Ref LoanTable

  NotifyApplicantFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/functions/notifyApplicant/index.notifyApplicant
      Runtime: nodejs14.x
      Environment:
        LOAN_TABLE: !Ref LoanTable

Outputs:
  LoanTableName:
    Description: "Loan Applications Table Name"
    Value: !Ref LoanTable
  SubmitLoanApplicationFunctionArn:
    Description: "ARN of Submit Loan Application Function"
    Value: !GetAtt SubmitLoanApplicationFunction.Arn
  EvaluateCreditScoreFunctionArn:
    Description: "ARN of Evaluate Credit Score Function"
    Value: !GetAtt EvaluateCreditScoreFunction.Arn
  ApproveOrRejectLoanFunctionArn:
    Description: "ARN of Approve or Reject Loan Function"
    Value: !GetAtt ApproveOrRejectLoanFunction.Arn
  NotifyApplicantFunctionArn:
    Description: "ARN of Notify Applicant Function"
    Value: !GetAtt NotifyApplicantFunction.Arn
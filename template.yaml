AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  AWS Lambda Durable Functions - Loan Approval Workflow
  
  Demonstrates AWS Lambda Durable Functions pattern with:
  - Automatic checkpointing and replay
  - Built-in retry logic per activity (max 3 attempts)
  - Deterministic execution with automatic error recovery
  - Long-duration execution support (up to 1 year)
  - Orchestrator + Activities pattern
  - DynamoDB for progress tracking

Globals:
  Function:
    Runtime: python3.13
    Architectures:
      - arm64
    MemorySize: 1024
    Timeout: 60
    Tracing: Active
    Environment:
      Variables:
        POWERTOOLS_LOG_LEVEL: INFO
        POWERTOOLS_METRICS_NAMESPACE: LoanWorkflow
    LoggingConfig:
      LogFormat: JSON
      ApplicationLogLevel: INFO
      SystemLogLevel: INFO

Resources:
  # ──────────────────────────────────────────────────────
  # DynamoDB Progress Table
  # ──────────────────────────────────────────────────────
  LoanProgressTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: loan-progress-v1
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: application_id
          AttributeType: S
      KeySchema:
        - AttributeName: application_id
          KeyType: HASH

  # ──────────────────────────────────────────────────────
  # Durable Workflow Lambda (Orchestrator)
  # ──────────────────────────────────────────────────────
  LoanWorkflowFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: LoanWorkflowFunction
      CodeUri: src/
      Handler: loan_demo.lambda_handler
      Timeout: 300
      MemorySize: 1024
      AutoPublishAlias: live
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: LoanWorkflow
          POWERTOOLS_LOG_LEVEL: INFO
          PROGRESS_TABLE: !Ref LoanProgressTable
          AWS_LAMBDA_LOG_LEVEL: INFO
      Policies:
        - AWSLambdaBasicExecutionRole
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource: !GetAtt LoanProgressTable.Arn
      Tags:
        Function: Orchestrator
        Pattern: DurableFunctions

  # ──────────────────────────────────────────────────────
  # External Fraud Check (Callback)
  # ──────────────────────────────────────────────────────
  FraudCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: FraudCheckFunction
      CodeUri: src/
      Handler: fraud_check.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: FraudCheck
          WORKFLOW_FUNCTION_NAME: LoanWorkflowFunction
      Policies:
        - AWSLambdaBasicExecutionRole

  # ──────────────────────────────────────────────────────
  # API Lambda + API Gateway
  # ──────────────────────────────────────────────────────
  LoanApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: "$default"
      DefaultRouteSettings:
        DetailedMetricsEnabled: true
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  LoanApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: LoanApiFunction
      CodeUri: src/
      Handler: api.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          POWERTOOLS_SERVICE_NAME: LoanApi
          PROGRESS_TABLE: !Ref LoanProgressTable
          LOAN_FUNCTION_NAME: LoanWorkflowFunction
      Policies:
        - AWSLambdaBasicExecutionRole
        - DynamoDBCrudPolicy:
            TableName: !Ref LoanProgressTable
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt LoanWorkflowFunction.Arn
                - !Sub "${LoanWorkflowFunction.Arn}:*"
      Events:
        PostApply:
          Type: HttpApi
          Properties:
            ApiId: !Ref LoanApi
            Path: /apply
            Method: POST
        GetStatus:
          Type: HttpApi
          Properties:
            ApiId: !Ref LoanApi
            Path: /status/{applicationId}
            Method: GET
        PostApprove:
          Type: HttpApi
          Properties:
            ApiId: !Ref LoanApi
            Path: /approve/{applicationId}
            Method: POST

Outputs:
  LoanApiUrl:
    Description: "API Gateway endpoint URL (set in frontend/.env as VITE_API_URL)"
    Value: !Sub "https://${LoanApi}.execute-api.${AWS::Region}.amazonaws.com"
